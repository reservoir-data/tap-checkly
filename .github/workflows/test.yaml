name: Test tap-checkly

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - tap_checkly/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/test.yaml
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - tap_checkly/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - .github/workflows/test.yaml
  workflow_dispatch:
  schedule:
  # Run weekly on Monday at 12:00 PM UTC
  - cron: "0 12 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  # renovate: datasource=pypi depName=prek
  PREK_VERSION: 0.4.5
  # renovate: datasource=pypi depName=uv
  UV_VERSION: "0.11.25"
  # renovate: datasource=pypi depName=tox
  TOX_VERSION: "4.56.1"
  # renovate: datasource=pypi depName=tox-uv
  TOX_UV_VERSION: "1.35.2"

jobs:
  build-package:
    name: Build & verify package
    runs-on: ubuntu-latest
    outputs:
      supported-python-versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df # v2.18.0
        id: baipp

  tests:
    name: Integration tests
    runs-on: ubuntu-24.04
    needs: build-package
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        python-version: ${{ fromJson(needs.build-package.outputs.supported-python-versions) }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        python-version: ${{ matrix.python-version }}
        version: ${{ env.UV_VERSION }}
    - name: Run
      env:
        PYTHON_VERSION: ${{ matrix.python-version }}
        TAP_CHECKLY_ACCOUNT_ID: ${{ secrets.TAP_CHECKLY_ACCOUNT_ID }}
        TAP_CHECKLY_TOKEN: ${{ secrets.TAP_CHECKLY_TOKEN }}
        TAP_CHECKLY_START_DATE: ${{ secrets.TAP_CHECKLY_START_DATE }}
      run: >
        uvx
        --with tox-uv=="${TOX_UV_VERSION}"
        --with tox=="${TOX_VERSION}"
        tox -e "$PYTHON_VERSION"

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ env.UV_VERSION }}
    - run: >
        uv tool install
        --managed-python
        --with tox-uv=="${TOX_UV_VERSION}"
        --from tox=="${TOX_VERSION}"
        tox
    - name: Static type checking
      run: tox -e typing
    - name: Unused, missing and transitive dependencies
      run: tox -e dependencies

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ env.UV_VERSION }}

    - run: >
        uvx
        --with prek=="${PREK_VERSION}"
        prek run --show-diff-on-failure --all-files
